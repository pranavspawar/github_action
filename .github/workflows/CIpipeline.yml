name : ci-pipeline 

on:
 push:
  branches:
   - main 

jobs:
 build-and-push: 
    runs-on: ubuntu-latest
    steps:
       - name: clone github code
         uses: action/checkout@v7

       - name: login to dockerhub
         uses: docker/login-action@v4
         with:
           username: ${{ vars.DOCKERHUB_USERNAME }}
           pasword: ${{ secrets.DOCKERHUB_TOKEN }}

           
           
